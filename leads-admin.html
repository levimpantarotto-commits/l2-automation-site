<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>L2 Automation · Leads</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  :root { --bg:#000;--surface-1:#0d0d0d;--surface-2:#161616;--border:rgba(212,175,55,0.18);
    --accent:#E6BE48;--accent-deep:#8B6F1F;--text:#fdfdfd;--text-2:#b8b8b8;--text-3:#777;
    --success:#00ff88;--warn:#ffb800;--err:#ff3366; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter Tight', 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 28px;
    background-image: linear-gradient(rgba(230,190,72,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(230,190,72,0.025) 1px, transparent 1px); background-size: 80px 80px; }
  header { display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 28px; }
  h1 { font-weight: 900; font-size: 2.2rem; letter-spacing: -0.04em; text-transform: uppercase;
    background: linear-gradient(180deg, #fff, #888); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; }
  nav.top { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  nav.top a { color: var(--text-3); text-decoration: none; padding: 9px 16px; border-radius: 4px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700;
    border: 1px solid transparent; }
  nav.top a:hover, nav.top a.active { color: var(--accent); background: var(--surface-1); border-color: var(--border); }
  .filtros { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .filtros input, .filtros select {
    background: var(--surface-1); color: var(--text); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 4px; font-family: inherit; font-size: 13px;
    min-width: 140px; outline: none;
  }
  .filtros input:focus, .filtros select:focus { border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  th { background: rgba(230,190,72,0.05); padding: 14px 18px; text-align: left;
    font-size: 10px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; }
  td { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-2); }
  tr:hover td { background: rgba(230,190,72,0.04); cursor: pointer; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .pill-novo { background: rgba(255,255,255,0.08); color: var(--text-2); }
  .pill-enriquecido { background: rgba(230,190,72,0.15); color: var(--accent); }
  .pill-contatado { background: rgba(255,184,0,0.15); color: var(--warn); }
  .pill-respondeu, .pill-qualificado { background: rgba(0,255,136,0.15); color: var(--success); }
  .pill-descartado { background: rgba(255,51,102,0.10); color: var(--err); }
  .score { font-weight: 800; }
  .score-alto { color: var(--success); }
  .score-medio { color: var(--warn); }
  .score-baixo { color: var(--err); }
  .badge { background: rgba(230,190,72,0.12); border: 1px solid var(--border); padding: 6px 14px;
    border-radius: 4px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; }
  #detalhe { position: fixed; top: 0; right: 0; height: 100vh; width: 600px; background: var(--surface-1);
    border-left: 1px solid var(--accent); overflow-y: auto; padding: 28px; display: none; z-index: 100;
    box-shadow: -20px 0 40px rgba(0,0,0,0.8); }
  #detalhe.open { display: block; }
  #close-detalhe { position: absolute; top: 16px; right: 20px; background: transparent;
    color: var(--text-3); border: none; font-size: 24px; cursor: pointer; }
  .conv { background: var(--surface-2); padding: 14px; border-radius: 4px; margin-bottom: 10px;
    border-left: 3px solid var(--accent); }
  .conv.recebida { border-left-color: var(--success); background: rgba(0,255,136,0.04); }
  .conv-meta { font-size: 10px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Leads</h1>
    <p style="color: var(--text-3); margin-top: 6px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;">Filtragem · BANT · Histórico</p>
  </div>
  <span class="badge" id="contador">— leads</span>
</header>

<nav class="top">
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/leads" class="active">Leads</a>
  <a href="/admin/inbox">Inbox</a>
  <a href="/admin/config">Config</a>
  <a href="/admin/" style="margin-left: auto;">← Painel React</a>
</nav>

<div class="filtros">
  <input type="text" id="f-q" placeholder="Buscar CNPJ/razão social..." />
  <select id="f-status">
    <option value="">Todos status</option>
    <option value="novo">Novo</option>
    <option value="enriquecido">Enriquecido</option>
    <option value="contatado">Contatado</option>
    <option value="respondeu">Respondeu</option>
    <option value="qualificado">Qualificado</option>
    <option value="reuniao">Reunião</option>
    <option value="cliente">Cliente</option>
    <option value="descartado">Descartado</option>
  </select>
  <select id="f-nicho">
    <option value="">Todos nichos</option>
    <option value="imobiliaria">Imobiliária</option>
    <option value="saude">Saúde</option>
    <option value="advocacia">Advocacia</option>
    <option value="consultoria">Consultoria</option>
    <option value="varejo">Varejo</option>
    <option value="outro">Outro</option>
  </select>
  <input type="number" id="f-score" placeholder="Score mín" />
  <input type="text" id="f-uf" placeholder="UF" maxlength="2" />
</div>

<table>
  <thead><tr><th>Status</th><th>CNPJ</th><th>Razão social</th><th>Cidade/UF</th><th>Nicho</th><th>Score</th><th>Email</th></tr></thead>
  <tbody id="tbody"></tbody>
</table>

<div id="detalhe">
  <button id="close-detalhe" onclick="document.getElementById('detalhe').classList.remove('open')">×</button>
  <div id="detalhe-content"></div>
</div>

<script>
async function carregar() {
  const params = new URLSearchParams();
  ['status','nicho','uf'].forEach(f => {
    const v = document.getElementById('f-' + f).value;
    if (v) params.set(f, v);
  });
  const q = document.getElementById('f-q').value;
  const s = document.getElementById('f-score').value;
  if (q) params.set('q', q);
  if (s) params.set('score_min', s);

  const r = await fetch('/api/leads-full?' + params);
  const data = await r.json();
  const leads = data.leads || [];

  document.getElementById('contador').textContent = `${leads.length} leads`;

  document.getElementById('tbody').innerHTML = leads.length === 0
    ? '<tr><td colspan="7" style="text-align: center; padding: 60px; color: var(--text-3);">Nenhum lead. Cadastra ICP em Config e roda CNPJ Finder.</td></tr>'
    : leads.map(l => {
        const scoreClass = !l.score ? '' : l.score >= 70 ? 'score-alto' : l.score >= 40 ? 'score-medio' : 'score-baixo';
        return `<tr onclick="abrirDetalhe(${l.id})">
          <td><span class="pill pill-${l.status || 'novo'}">${l.status}</span></td>
          <td style="font-family: monospace;">${l.cnpj || '—'}</td>
          <td><strong>${l.razao_social || l.nome_fantasia || '—'}</strong></td>
          <td>${l.cidade || ''}${l.uf ? '/' + l.uf : ''}</td>
          <td>${l.nicho || '—'}</td>
          <td class="score ${scoreClass}">${l.score || '—'}</td>
          <td style="font-size: 11px; color: var(--text-3);">${l.email || '—'}</td>
        </tr>`;
      }).join('');
}

async function abrirDetalhe(id) {
  const r = await fetch('/api/leads/' + id);
  const data = await r.json();
  const l = data.lead;
  const convs = data.conversas || [];
  const fups = data.followups || [];

  document.getElementById('detalhe-content').innerHTML = `
    <h2 style="font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px;">${l.razao_social || l.cnpj}</h2>
    <p style="color: var(--text-3); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 24px;">
      ${l.cnpj} · ${l.cidade || ''}/${l.uf || ''} · ${l.porte || ''}
    </p>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px;">
      <div style="background: var(--surface-2); padding: 12px; border-radius: 4px; text-align: center;">
        <div style="font-size: 9px; color: var(--text-3); letter-spacing: 0.2em;">BUDGET</div>
        <div style="font-size: 1.5rem; color: var(--accent); font-weight: 800;">${l.bant_budget || '—'}</div>
      </div>
      <div style="background: var(--surface-2); padding: 12px; border-radius: 4px; text-align: center;">
        <div style="font-size: 9px; color: var(--text-3); letter-spacing: 0.2em;">AUTHORITY</div>
        <div style="font-size: 1.5rem; color: var(--accent); font-weight: 800;">${l.bant_authority || '—'}</div>
      </div>
      <div style="background: var(--surface-2); padding: 12px; border-radius: 4px; text-align: center;">
        <div style="font-size: 9px; color: var(--text-3); letter-spacing: 0.2em;">NEED</div>
        <div style="font-size: 1.5rem; color: var(--accent); font-weight: 800;">${l.bant_need || '—'}</div>
      </div>
      <div style="background: var(--surface-2); padding: 12px; border-radius: 4px; text-align: center;">
        <div style="font-size: 9px; color: var(--text-3); letter-spacing: 0.2em;">TIMELINE</div>
        <div style="font-size: 1.5rem; color: var(--accent); font-weight: 800;">${l.bant_timeline || '—'}</div>
      </div>
    </div>

    ${l.bant_detalhe ? `<div style="background: var(--surface-2); padding: 12px; border-radius: 4px; margin-bottom: 24px; font-size: 11px; color: var(--text-3); font-family: monospace; white-space: pre-wrap;">${l.bant_detalhe}</div>` : ''}

    <h3 style="font-size: 11px; color: var(--accent-deep); letter-spacing: 0.2em; text-transform: uppercase; margin: 24px 0 12px;">Conversas (${convs.length})</h3>
    ${convs.length === 0 ? '<p style="color: var(--text-3); font-size: 12px;">Sem mensagens ainda</p>' :
      convs.map(c => `
        <div class="conv ${c.direcao}">
          <div class="conv-meta">${c.direcao} · ${c.canal} · ${new Date(c.timestamp).toLocaleString('pt-BR')} ${c.agente_origem ? '· ' + c.agente_origem : ''}</div>
          ${c.assunto ? `<div style="font-weight: 700; margin-bottom: 6px;">${c.assunto}</div>` : ''}
          <div style="font-size: 12px; white-space: pre-wrap; color: var(--text-2);">${c.mensagem}</div>
        </div>
      `).join('')}

    <h3 style="font-size: 11px; color: var(--accent-deep); letter-spacing: 0.2em; text-transform: uppercase; margin: 24px 0 12px;">Follow-ups agendados (${fups.length})</h3>
    ${fups.length === 0 ? '<p style="color: var(--text-3); font-size: 12px;">Nenhum agendado</p>' :
      fups.map(f => `
        <div style="background: var(--surface-2); padding: 10px 14px; border-radius: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 12px;">
          <span>Tentativa ${f.tentativa} · ${f.canal}</span>
          <span style="color: ${f.status === 'pendente' ? 'var(--warn)' : 'var(--text-3)'}">${f.status} · ${new Date(f.agendado_para).toLocaleString('pt-BR')}</span>
        </div>
      `).join('')}

    <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);">
      <button onclick="optOut(${l.id}, '${l.email || ''}', '${l.cnpj || ''}')" style="background: transparent; color: var(--err); border: 1px solid var(--err); padding: 10px 20px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700;">Registrar Opt-out</button>
    </div>
  `;
  document.getElementById('detalhe').classList.add('open');
}

async function optOut(leadId, email, cnpj) {
  if (!confirm('Marcar como opt-out? Todos os followups serão cancelados.')) return;
  await fetch('/api/opt-outs', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, cnpj, motivo: 'admin marcou manualmente', origem: 'admin_manual' })
  });
  alert('Opt-out registrado.');
  document.getElementById('detalhe').classList.remove('open');
  carregar();
}

let timer;
['f-q','f-status','f-nicho','f-score','f-uf'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(carregar, 400);
  });
});

carregar();
</script>
</body>
</html>
