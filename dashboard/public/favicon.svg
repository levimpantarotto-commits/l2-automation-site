  <!-- L2 text -->
  <text
    x="52" y="168"
    font-family="'Inter Tight', sans-serif"
    font-weight="900"
    font-size="112"
    letter-spacing="-4"
    fill="#FFFFFF"
  >L2</text>
</svg>
