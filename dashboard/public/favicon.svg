    d="M 148,18 L 52,18 L 18,54 L 18,154 L 52,190 L 100,190"
    stroke="#D4AF37" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
  />
  <!-- Circuit trace from bottom -->
  <path
    d="M 100,190 L 100,200 L 185,200"
    stroke="#D4AF37" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
  />
  <!-- Terminal circle -->
