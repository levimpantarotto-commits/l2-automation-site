<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0CB6E"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6F1F"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E8EC"/>
      <stop offset="55%" stop-color="#9C9CA2"/>
      <stop offset="100%" stop-color="#5C5C62"/>
    </linearGradient>
    <radialGradient id="terminal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="30%" stop-color="#FFBC42"/>
      <stop offset="70%" stop-color="#D4881F"/>
      <stop offset="100%" stop-color="#5C3812"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal: lado esquerdo dourado (top-left → bottom-left → bottom) -->
  <path d="M 128,24 L 50,24 L 18,80 L 18,176 L 50,232 L 128,232"
        stroke="url(#gold)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Hexagonal: lado direito prata (top-right → bottom-right) -->
  <path d="M 128,24 L 206,24 L 238,80 L 238,176 L 206,232 L 128,232"
        stroke="url(#silver)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Circuit trace saindo do bottom-right -->
  <path d="M 206,232 L 232,232 L 232,250"
        stroke="url(#silver)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Terminal: ponto dourado com glow -->
  <circle cx="232" cy="250" r="11" fill="url(#terminal)" filter="url(#glow)"/>
  <circle cx="232" cy="250" r="6" fill="#FFE9A8"/>

  <!-- L2 (prata, centrado) -->
  <text x="128" y="165" text-anchor="middle"
        font-family="'Inter Tight','Inter',system-ui,sans-serif"
        font-weight="900" font-size="115" letter-spacing="-4"
        fill="url(#silver)">L2</text>
</svg>
